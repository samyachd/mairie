# Reverse proxy in front of the loki container.
# Adds HTTP basic auth so nothing on the docker network can push or query
# logs without credentials. Listens on the same port loki uses (3100) so
# downstream services (promtail, grafana) only need to swap the hostname:
#   loki:3100  →  loki-proxy:3100

server {
    listen 3100;
    server_name _;

    # All log push/query endpoints under /loki/api/* require auth.
    location / {
        auth_basic           "Loki";
        auth_basic_user_file /etc/nginx/htpasswd;

        proxy_pass         http://loki:3100;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Loki streams long polls; keep the connection alive longer.
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # Health probe used by promtail's depends_on; bypass auth so it stays cheap.
    location = /ready {
        proxy_pass http://loki:3100/ready;
    }
}
