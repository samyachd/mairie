# Apache reverse proxy for the mairie inventory app.
#
# Install on the prod host:
#   sudo cp deploy/apache/mairie.conf /etc/apache2/sites-available/mairie.conf
#   sudo a2enmod ssl proxy proxy_http headers rewrite remoteip
#   sudo a2ensite mairie
#   sudo a2dissite 000-default     # if it conflicts on :80
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# Get the cert (Let's Encrypt):
#   sudo apt-get install -y certbot python3-certbot-apache
#   sudo certbot --apache -d inventaire.mairie.example.fr
#
# Frontend container is bound to 127.0.0.1:80 by docker-compose.prod.yml.
# Its nginx already routes /api/* to the backend; Apache only does TLS
# termination and forwards everything to that one upstream.

<VirtualHost *:80>
    ServerName inventaire.mairie.example.fr

    # Send everything to HTTPS, except ACME challenges which must stay on :80.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName inventaire.mairie.example.fr

    # Replace by certbot's actual cert paths after `certbot --apache` runs.
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/inventaire.mairie.example.fr/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/inventaire.mairie.example.fr/privkey.pem

    # Modern TLS only.
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # Security headers
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options    "nosniff"
    Header always set Referrer-Policy           "strict-origin-when-cross-origin"

    # Reverse proxy → frontend container (which itself proxies /api/* to backend)
    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass        /  http://127.0.0.1:80/
    ProxyPassReverse /  http://127.0.0.1:80/

    # Long timeout for OCR uploads
    ProxyTimeout 300

    # Trust X-Forwarded-For from the frontend nginx so Apache logs the real client.
    RemoteIPHeader X-Forwarded-For
    RemoteIPInternalProxy 127.0.0.1

    ErrorLog  ${APACHE_LOG_DIR}/mairie_error.log
    CustomLog ${APACHE_LOG_DIR}/mairie_access.log combined
</VirtualHost>
