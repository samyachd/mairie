# frontend/nginx.conf

server {
    listen 80;
    server_name _;
    
    # Compression gzip pour économiser la bande passante
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;
    
    # Servir les fichiers statiques du frontend
    root /usr/share/nginx/html;
    index index.html;
    
    # SPA fallback : toutes les routes non-fichiers retournent index.html
    # (sinon /inventaire renvoie un 404, alors que React Router doit gérer la route)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Cache des fichiers statiques (CSS, JS, images...)
    location ~* \.(?:css|js|jpg|jpeg|png|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Proxy vers le backend FastAPI
    # Toute requête /api/xxx est redirigée vers le service backend du docker-compose
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout pour les longs traitements (OCR notamment)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}