name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests backend
    runs-on: ubuntu-latest
    
    # Service Postgres qui tourne à côté du job pour les tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        # Healthcheck : attend que Postgres soit prêt avant de démarrer les tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Installer uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true  # cache les dépendances pour accélérer les runs suivants
      
      - name: Installer Python 3.12
        run: uv python install 3.12
      
      - name: Installer les dépendances
        working-directory: ./backend
        run: uv sync
      
      - name: Lancer les migrations Alembic
        working-directory: ./backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
          SECRET_KEY: test_secret_not_real
          MISTRAL_API_KEY: fake_key_for_tests
          CORS_ORIGINS: http://localhost:5173
        run: uv run alembic upgrade head

      - name: Lancer pytest
        working-directory: ./backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
          SECRET_KEY: test_secret_not_real
          MISTRAL_API_KEY: fake_key_for_tests
          CORS_ORIGINS: http://localhost:5173
        run: uv run pytest --tb=short -v