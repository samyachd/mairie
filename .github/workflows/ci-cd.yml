  #         - non
  #         - oui

# =============================================================
# FÉVRIER — Tests & Build
# Actif dès le début. À chaque push sur main :
#   1. On installe les dépendances
#   2. On lance pytest
#   3. Si les tests passent → on build l'image Docker
# =============================================================
jobs:
  # --- JOB 1 : Tests automatiques ---
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install pytest httpx  # httpx nécessaire pour TestClient

      - name: Lancer les tests
        run: pytest --tb=short -v
        # --tb=short : affiche les erreurs de façon concise
        # -v : mode verbeux, on voit chaque test

  # --- JOB 2 : Build Docker ---
  # Ne tourne que si les tests passent (needs: test)
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et push l'image Docker
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ton-username/inventaire-api:latest
            ton-username/inventaire-api:${{ github.sha }}
            # ↑ on tag aussi avec le SHA du commit
            #   comme ça on peut revenir à une version précise
            #   exemple : ton-username/inventaire-api:a1b2c3d

  # =============================================================
