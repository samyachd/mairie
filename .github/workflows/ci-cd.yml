# =============================================================
# CI/CD Pipeline — Inventaire IT + Chatbot RH
# Fichier : .github/workflows/ci-cd.yml
#
# Ce pipeline évolue chaque mois :
#   FÉVRIER  → tests automatiques + build Docker
#   MARS     → + déploiement automatique sur staging
#   AVRIL    → + smoke tests après chaque deploy
#   MAI      → + déploiement en production (manuel)
#
# Secrets à ajouter sur GitHub (Settings > Secrets) :
#   FÉVRIER  : DOCKER_USERNAME, DOCKER_PASSWORD
#   MARS     : RAILWAY_STAGING_WEBHOOK (depuis Railway > Settings > Deploy Hook)
#              STAGING_URL (ex: https://ton-app-staging.up.railway.app)
#   AVRIL    : STAGING_TEST_TOKEN (un JWT valide pour tester les routes protégées)
#   MAI      : RAILWAY_PROD_WEBHOOK
# =============================================================

name: CI/CD Pipeline — Inventaire IT

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # --- MAI : activer cette section en mai ---
