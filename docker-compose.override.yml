services:
  db:
    ports:
      - "5432:5432"   # accessible depuis DBeaver/pgAdmin

  backend:
    build:
      args:
        DEV: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  prometheus:
    ports:
      - "9090:9090"

  grafana:
    ports:
      - "3001:3000"

  loki:
    ports:
      - "3100:3100"