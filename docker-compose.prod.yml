# Prod overlay: pre-built images, no source mounts, prod env files only.
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Required on the host:
#   /.env.prod                — POSTGRES_*, GRAFANA_ADMIN_PASSWORD, VITE_API_URL
#   /backend/.env.prod        — SECRET_KEY, MISTRAL_API_KEY, CORS_ORIGINS, etc.

services:
  frontend:
    image: ghcr.io/samyachd/mairie/frontend:latest
    # Bind 127.0.0.1:80 so the host's reverse proxy (Apache/Caddy) handles TLS
    # and public exposure. Drop the 127.0.0.1 prefix only if no reverse proxy.
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: ghcr.io/samyachd/mairie/backend:latest
    # Override base compose's env_file to use prod-only files
    env_file:
      - .env.prod
      - backend/.env.prod
    environment:
      POSTGRES_HOST: db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/').status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    env_file:
      - .env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    volumes:
      - ./prometheus.prod.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    env_file:
      - .env.prod
    restart: unless-stopped

  loki:
    volumes:
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail.prod.yml:/etc/promtail/config.yml
    restart: unless-stopped

volumes:
  prometheus_data:
  loki_data:
